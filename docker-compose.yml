version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: bot_db
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    command: sh -c "cd backend && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,web"
      DATABASE_URL: "postgresql://botuser:botpass123@db:5432/bot_db"
    depends_on:
      - db

volumes:
  postgres_data:
  media_data:
  static_data:
